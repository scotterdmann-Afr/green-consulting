services:
  - type: web
    name: green-consulting-api
    runtime: python
    buildCommand: pip install -r requirements.txt && apt-get install -y libreoffice
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # tu le saisiras manuellement dans le dashboard Render
    rootDir: backend
